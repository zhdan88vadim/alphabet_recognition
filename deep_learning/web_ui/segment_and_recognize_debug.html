<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Распознавание русских букв на изображении</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }
        .image-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .image-box {
            flex: 1;
            min-width: 400px;
            text-align: center;
        }
        canvas, img {
            max-width: 100%;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            background: white;
        }
        .result-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            padding: 15px;
            background: #f0f0ff;
            border-radius: 10px;
        }
        .letter-box {
            display: inline-block;
            margin: 5px;

            text-align: center;
            min-width: 60px;
        }
        .letter {
            font-size: 28px;
            font-weight: bold;

        }
        .confidence {
            font-size: 12px;
            color: #666;
        }
        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
        .progress {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        .hidden {
            display: none;
        }
        .letter-debug {
            border: 1px solid #ddd;
            margin: 10px;
            padding: 10px;
            display: inline-block;
            vertical-align: top;
            background: white;
            border-radius: 8px;
            min-width: 250px;
        }
        .debug-image {
            max-width: 100px;
            max-height: 100px;
            border: 1px solid #667eea;
            margin: 5px;
        }
        .top3-item {
            margin: 3px 0;
            padding: 2px 5px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 12px;
        }
        .top3-letter {
            font-weight: bold;
            color: #667eea;
        }
        .top3-bar {
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            height: 14px;
            margin-top: 2px;
        }
        .top3-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            font-size: 10px;
            line-height: 14px;
            padding-right: 3px;
            color: white;
            text-align: right;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📷 Распознавание текста на изображении</h2>
        <p>Загрузите изображение с текстом (русские буквы)</p>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            📁 Нажмите или перетащите изображение сюда
            <input type="file" id="fileInput" accept="image/*" style="display: none" onchange="loadImage(event)">
        </div>
        
        <div id="status" class="loading">🔄 Загрузка OpenCV и модели...</div>
        <div id="progress" class="progress hidden"><div class="progress-bar"></div></div>
    </div>
    
    <div class="image-container">
        <div class="image-box">
            <h3>Исходное изображение</h3>
            <canvas id="originalCanvas"></canvas>
        </div>
        <div class="image-box">
            <h3>Результат распознавания</h3>
            <canvas id="resultCanvas"></canvas>
        </div>
    </div>
    
    <div class="card" id="resultCard" style="display: none;">
        <h3>📝 Распознанный текст:</h3>
        <div id="recognizedText" class="result-text"></div>
        <div id="lettersDetail"></div>
    </div>
    
    <div class="card" id="debugCard" style="display: none;">
        <h3>🔍 Отладка: вырезанные области и результат предобработки</h3>
        <div id="debugContent"></div>
    </div>
</div>

<script>
    let session = null;
    let cvReady = false;
    
    const classNames = ['Ё', 'А', 'Б', 'В', 'Г', 'Д', 'Е', 'Ж', 'З', 'И', 'Й', 
                        'К', 'Л', 'М', 'Н', 'О', 'П', 'Р', 'С', 'Т', 'У', 'Ф', 
                        'Х', 'Ц', 'Ч', 'Ш', 'Щ', 'Ъ', 'Ы', 'Ь', 'Э', 'Ю', 'Я'];
    
    function onOpenCVReady() {
        console.log("OpenCV готов");
        cvReady = true;
        init();
    }
    
    async function loadModel() {
        try {
            updateStatus('Загрузка модели...', 10);
            const response = await fetch('./alphabet_model.onnx');
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            const arrayBuffer = await response.arrayBuffer();
            session = await ort.InferenceSession.create(arrayBuffer);
            updateStatus('✅ Модель загружена', 100);
            return true;
        } catch(e) {
            updateStatus('❌ Ошибка загрузки модели: ' + e.message, 0);
            console.error(e);
            return false;
        }
    }
    
    function softmax(logits) {
        const maxLogit = Math.max(...logits);
        const expValues = logits.map(l => Math.exp(l - maxLogit));
        const sumExp = expValues.reduce((a, b) => a + b, 0);
        return expValues.map(e => e / sumExp);
    }
    
    // Функция поиска bounding box буквы
    function findBoundingBox(imageData, threshold=0.5) {
        let minX = 64, minY = 64, maxX = 0, maxY = 0;
        let hasPixel = false;
        
        for (let y = 0; y < 64; y++) {
            for (let x = 0; x < 64; x++) {
                const idx = y * 64 + x;
                if (imageData[idx] < threshold) {
                    hasPixel = true;
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
        }
        
        if (!hasPixel) return null;
        return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
    }
    
    // Функция вырезания буквы с отступом
    function extractLetterWithMargin(imageData, margin=15) {
        const bbox = findBoundingBox(imageData);
        if (!bbox) return null;
        
        let startX = Math.max(0, bbox.x - margin);
        let startY = Math.max(0, bbox.y - margin);
        let endX = Math.min(64, bbox.x + bbox.w + margin);
        let endY = Math.min(64, bbox.y + bbox.h + margin);
        
        const cropped = [];
        for (let y = startY; y < endY; y++) {
            for (let x = startX; x < endX; x++) {
                cropped.push(imageData[y * 64 + x]);
            }
        }
        
        return { data: cropped, w: endX - startX, h: endY - startY };
    }
    
    // Полная предобработка (как в рабочем примере с рисованием)
    function preprocessImage(roiCanvas) {
        // 1. Получаем данные с canvas и изменяем размер до 64x64
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 64;
        tempCanvas.height = 64;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(roiCanvas, 0, 0, roiCanvas.width, roiCanvas.height, 0, 0, 64, 64);
        
        // Получаем изображение в градациях серого
        let imageData = tempCtx.getImageData(0, 0, 64, 64);
        let grayData = new Array(64 * 64);
        
        for (let i = 0; i < imageData.data.length; i += 4) {
            let gray = (imageData.data[i] + imageData.data[i+1] + imageData.data[i+2]) / (3 * 255);
            grayData[i/4] = gray;
        }
        
        // 2. Инвертируем (Invert)
        // for (let i = 0; i < grayData.length; i++) {
        //     grayData[i] = 1 - grayData[i];
        // }
        
        // 3. ExtractLetterWithMargin
        const extracted = extractLetterWithMargin(grayData, 15);
        if (!extracted) return null;
        
        // 4. SquarePad
        const size = Math.max(extracted.w, extracted.h);
        const squared = new Array(size * size).fill(1.0);
        
        const offsetX = Math.floor((size - extracted.w) / 2);
        const offsetY = Math.floor((size - extracted.h) / 2);
        
        for (let y = 0; y < extracted.h; y++) {
            for (let x = 0; x < extracted.w; x++) {
                const srcIdx = y * extracted.w + x;
                const dstIdx = (offsetY + y) * size + (offsetX + x);
                squared[dstIdx] = extracted.data[srcIdx];
            }
        }
        
        // 5. Resize обратно до 64x64
        const resized = new Array(64 * 64);
        const scale = size / 64;
        
        for (let y = 0; y < 64; y++) {
            for (let x = 0; x < 64; x++) {
                const srcX = Math.floor(x * scale);
                const srcY = Math.floor(y * scale);
                if (srcX < size && srcY < size) {
                    resized[y * 64 + x] = squared[srcY * size + srcX];
                } else {
                    resized[y * 64 + x] = 1.0;
                }
            }
        }
        
        // 6. Normalize (mean=0.5, std=0.5)
        const normalized = new Float32Array(1 * 1 * 64 * 64);
        for (let i = 0; i < resized.length; i++) {
            normalized[i] = (resized[i] - 0.5) / 0.5;
        }
        
        return { tensor: new ort.Tensor('float32', normalized, [1, 1, 64, 64]), finalImage: resized };
    }
    
    // Преобразование Mat в canvas (через cv.imshow)
    function matToCanvas(mat) {
        const canvas = document.createElement('canvas');
        canvas.width = mat.cols;
        canvas.height = mat.rows;
        try {
            cv.imshow(canvas, mat);
        } catch(e) {
            console.error('matToCanvas error:', e);
        }
        return canvas;
    }
    
    // Визуализация финального изображения (после предобработки)
    function visualizeFinalImage(finalImageData) {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(64, 64);
        
        for (let i = 0; i < finalImageData.length; i++) {
            const val = finalImageData[i] * 255;
            imageData.data[i * 4] = val;
            imageData.data[i * 4 + 1] = val;
            imageData.data[i * 4 + 2] = val;
            imageData.data[i * 4 + 3] = 255;
        }
        ctx.putImageData(imageData, 0, 0);
        return canvas;
    }
    
    // Сегментация букв
    function segmentLetters(grayMat, minArea = 300, maxArea = 8000) {
        const binary = new cv.Mat();
        cv.adaptiveThreshold(grayMat, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);
        
        const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
        const closed = new cv.Mat();
        cv.morphologyEx(binary, closed, cv.MORPH_CLOSE, kernel, new cv.Point(-1, -1), 2);
        
        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(closed, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
        
        const letterBoxes = [];
        
        for (let i = 0; i < contours.size(); i++) {
            const contour = contours.get(i);
            const area = cv.contourArea(contour);
            
            if (area < minArea || area > maxArea) continue;
            
            const rect = cv.boundingRect(contour);
            const aspectRatio = rect.width / rect.height;
            
            if (aspectRatio < 0.2 || aspectRatio > 3.0) continue;
            
            const padding = 10;
            const x = Math.max(0, rect.x - padding);
            const y = Math.max(0, rect.y - padding);
            const w = Math.min(grayMat.cols - x, rect.width + 2 * padding);
            const h = Math.min(grayMat.rows - y, rect.height + 2 * padding);
            
            letterBoxes.push({ bbox: { x, y, w, h }, area: area });
        }
        
        letterBoxes.sort((a, b) => a.bbox.x - b.bbox.x);
        
        binary.delete();
        kernel.delete();
        closed.delete();
        contours.delete();
        hierarchy.delete();
        
        return letterBoxes;
    }

    // Утолщение буквы через OpenCV
    function thickenLetterWithOpenCV(roiCanvas) {
        // Конвертируем canvas в Mat
        let mat = cv.imread(roiCanvas);
        let gray = new cv.Mat();
        cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY);
        
        // Бинаризация
        let binary = new cv.Mat();
        cv.threshold(gray, binary, 127, 255, cv.THRESH_BINARY);
        
        // Морфологическое расширение (утолщение)
        let kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(5, 5));
        let dilated = new cv.Mat();
        // cv.dilate(binary, dilated, kernel, new cv.Point(-1, -1), 2); // iterations=2 для большей жирности

        cv.erode(binary, dilated, kernel, new cv.Point(-1, -1), 1); // iterations=2 для большей жирности
        
        // Конвертируем обратно в canvas
        cv.imshow(roiCanvas, dilated);
        
        // Очистка
        mat.delete();
        gray.delete();
        binary.delete();
        kernel.delete();
        dilated.delete();
        
        return roiCanvas;
    }

    function preprocessImageOpenCV(imageMat) {
        let gray;
        
        // 1. Конвертируем в grayscale если нужно
        if (imageMat.channels() === 3) {
            gray = new cv.Mat();
            cv.cvtColor(imageMat, gray, cv.COLOR_RGBA2GRAY);
        } else {
            gray = imageMat.clone();
        }
        
        // 2. Размытие по Гауссу
        let blurred = new cv.Mat();
        cv.GaussianBlur(imageMat, blurred, new cv.Size(5, 5), 0);
        // cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
        
        // 3. Адаптивная бинаризация
        let binary = new cv.Mat();
        cv.adaptiveThreshold(
            blurred, binary, 255, 
            cv.ADAPTIVE_THRESH_GAUSSIAN_C, 
            cv.THRESH_BINARY_INV, 11, 2
        );
        
        // 4. Морфологические операции
        let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
        
        let closed = new cv.Mat();
        cv.morphologyEx(binary, closed, cv.MORPH_CLOSE, kernel);
        
        let opened = new cv.Mat();
        cv.morphologyEx(closed, opened, cv.MORPH_OPEN, kernel);
        
        let dilated = new cv.Mat();
        cv.dilate(opened, dilated, kernel, new cv.Point(-1, -1), 2);
        
        // ✅ ОЧИЩАЕМ ВСЕ ВРЕМЕННЫЕ Mat'ы
        blurred.delete();
        // binary.delete();
        kernel.delete();
        closed.delete();
        opened.delete();
        // dilated.delete(); // НЕ УДАЛЯЕМ - он нужен для возврата
        
        // ✅ ВОЗВРАЩАЕМ gray И dilated (НЕ УДАЛЯЙТЕ ИХ)
        return { gray: gray, binary: dilated };
    }


    async function recognizeImage(imageMat) {
        updateStatus('Обработка изображения...', 20);
        
        let gray = new cv.Mat();
        cv.cvtColor(imageMat, gray, cv.COLOR_RGBA2GRAY);

        // 2. Размытие по Гауссу
        let blurred = new cv.Mat();
        cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
        
        // 3. Адаптивная бинаризация
        let binary = new cv.Mat();
        cv.adaptiveThreshold(
            blurred, binary, 255, 
            cv.ADAPTIVE_THRESH_GAUSSIAN_C, 
            cv.THRESH_BINARY_INV, 11, 2
        );


        // 4. Морфологические операции
        let kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(3, 3));
        
        let closed = new cv.Mat();
        cv.morphologyEx(binary, closed, cv.MORPH_CLOSE, kernel);
        
        let opened = new cv.Mat();
        cv.morphologyEx(closed, opened, cv.MORPH_OPEN, kernel);
        
        let dilated = new cv.Mat();
        cv.dilate(opened, dilated, kernel, new cv.Point(-1, -1), 2);


        console.log('before', gray.channels());
        debugger
        
        // const { gray, binary } = preprocessImageOpenCV(imageMat)
        
        console.log('after');

        updateStatus('Поиск букв на изображении...', 40);
        const letterBoxes = segmentLetters(dilated);
        
        if (letterBoxes.length === 0) {
            updateStatus('⚠️ Буквы не найдены.', 100);
            gray.delete();
            binary.delete();
            return [];
        }
        
        updateStatus(`Найдено ${letterBoxes.length} букв, распознавание...`, 60);
        
        const results = [];
        const debugDiv = document.getElementById('debugContent');
        if (debugDiv) debugDiv.innerHTML = '';
        
        for (let i = 0; i < letterBoxes.length; i++) {
            const box = letterBoxes[i];
            const { x, y, w, h } = box.bbox;
            
            console.log(`Буква ${i+1}: (${x},${y}) ${w}x${h}`);
            
            // Вырезаем область
            const letterRoi = dilated.roi(new cv.Rect(x, y, w, h));
            
            // Создаем canvas из ROI (через cv.imshow)
            const roiCanvas = matToCanvas(letterRoi);
            roiCanvas.style.maxWidth = '100px';
            roiCanvas.style.maxHeight = '100px';
            roiCanvas.style.border = '1px solid #667eea';
            roiCanvas.style.margin = '5px';

            console.log('thickenLetterWithOpenCV');
            
            thickenLetterWithOpenCV(roiCanvas);
            
            // Применяем предобработку (как в рабочем примере с рисованием)
            const processed = preprocessImage(roiCanvas);
            
            if (!processed) {
                console.log(`Буква ${i+1}: ошибка предобработки`);
                letterRoi.delete();
                continue;
            }
            
            // Распознаем
            const results_inf = await session.run({ input: processed.tensor });
            const logits = results_inf.output.data;
            const probabilities = softmax(Array.from(logits));
            
            // Получаем топ-3
            const top3 = probabilities
                .map((p, idx) => ({ p, idx }))
                .sort((a, b) => b.p - a.p)
                .slice(0, 3);
            
            const topLetter = classNames[top3[0].idx];
            const topConfidence = top3[0].p * 100;
            
            // Визуализируем финальное изображение (после предобработки)
            const finalCanvas = visualizeFinalImage(processed.finalImage);
            finalCanvas.style.maxWidth = '100px';
            finalCanvas.style.maxHeight = '100px';
            finalCanvas.style.border = '1px solid #ff9800';
            finalCanvas.style.margin = '5px';
            
            // Формируем HTML для топ-3
            let top3Html = '<div style="margin-top: 8px;"><strong>Топ-3:</strong></div>';
            for (let t of top3) {
                const letter = classNames[t.idx];
                const percent = (t.p * 100).toFixed(1);
                top3Html += `
                    <div class="top3-item">
                        <span class="top3-letter">${letter}</span>
                        <span style="float: right;">${percent}%</span>
                        <div class="top3-bar">
                            <div class="top3-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }
            
            // Добавляем в отладку
            if (debugDiv) {
                const letterDebug = document.createElement('div');
                letterDebug.className = 'letter-debug';
                letterDebug.innerHTML = `
                    <div><strong>Буква ${i+1}</strong> (исходный размер: ${w}x${h})</div>
                    <div style="display: inline-block; text-align: center; margin: 5px;">
                        <div>Вырезанная область</div>
                        <img src="${roiCanvas.toDataURL()}" class="debug-image">
                    </div>
                    <div style="display: inline-block; text-align: center; margin: 5px;">
                        <div>После предобработки</div>
                        <img src="${finalCanvas.toDataURL()}" class="debug-image">
                    </div>
                    <div style="margin-top: 5px;">✅ Распознано: <strong style="font-size: 18px; color: #667eea;">${topLetter}</strong> (${topConfidence.toFixed(1)}%)</div>
                    ${top3Html}
                `;
                debugDiv.appendChild(letterDebug);
            }
            
            results.push({
                index: i,
                bbox: box.bbox,
                letter: topLetter,
                confidence: topConfidence,
                top3: top3.map(t => ({ letter: classNames[t.idx], confidence: t.p * 100 }))
            });
            
            const progress = 60 + (i / letterBoxes.length) * 30;
            updateStatus(`Распознано ${i+1}/${letterBoxes.length} букв`, progress);
            
            letterRoi.delete();
        }
    
        gray.delete();
        binary.delete();

  
        blurred.delete();
        kernel.delete();
        closed.delete();
        opened.delete();
        dilated.delete();        
        
        if (debugDiv && results.length > 0) {
            document.getElementById('debugCard').style.display = 'block';
        }
        
        return results;
    }
    
    function drawResults(originalMat, results) {
        const canvas = document.getElementById('resultCanvas');
        canvas.width = originalMat.cols;
        canvas.height = originalMat.rows;
        const ctx = canvas.getContext('2d');
        
        const displayCanvas = matToCanvas(originalMat);
        ctx.drawImage(displayCanvas, 0, 0);
        
        for (const res of results) {
            const { x, y, w, h } = res.bbox;
            
            ctx.strokeStyle = '#4CAF50';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(x, y - 25, Math.min(w, 60), 22);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.fillText(res.letter, x + 5, y - 5);
            
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.font = '12px Arial';
            ctx.fillText(`${res.confidence.toFixed(0)}%`, x + 5, y + h - 5);
        }
    }
    
    function displayTextResults(results) {
        const text = results.map(r => r.letter).join('');
        document.getElementById('recognizedText').innerHTML = `"${text}"`;
        
        let lettersHtml = '<div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px;">';
        for (const res of results) {
            lettersHtml += `
                <div class="letter-box">
                    <div class="letter">${res.letter}</div>
                    <div class="confidence">${res.confidence.toFixed(1)}%</div>
                </div>
            `;
        }
        lettersHtml += '</div>';
        
        // Добавляем топ-3 для всего текста
        lettersHtml += '<div style="margin-top: 20px;"><strong>📊 Детали по буквам:</strong></div>';
        for (const res of results) {
            lettersHtml += `<div style="margin-top: 10px;"><strong>Буква ${res.index + 1}:</strong> ${res.letter} (${res.confidence.toFixed(1)}%)`;
            lettersHtml += `<div style="font-size: 12px; color: #666;">Топ-3: `;
            for (let i = 0; i < res.top3.length; i++) {
                lettersHtml += `${res.top3[i].letter} (${res.top3[i].confidence.toFixed(1)}%)`;
                if (i < res.top3.length - 1) lettersHtml += ', ';
            }
            lettersHtml += `</div></div>`;
        }
        
        document.getElementById('lettersDetail').innerHTML = lettersHtml;
        document.getElementById('resultCard').style.display = 'block';
    }
    
    function updateStatus(message, progress) {
        document.getElementById('status').innerHTML = message;
        if (progress !== undefined && progress >= 0) {
            const progressDiv = document.getElementById('progress');
            progressDiv.classList.remove('hidden');
            document.querySelector('.progress-bar').style.width = progress + '%';
            if (progress >= 100) {
                setTimeout(() => {
                    progressDiv.classList.add('hidden');
                }, 1000);
            }
        }
    }
        
    async function loadImage(event) {
        console.log('loadImage');
        
        if (!cvReady) {
            alert('OpenCV еще не загружен. Подождите...');
            return;
        }
        
        if (!session) {
            alert('Модель еще не загружена. Подождите...');
            return;
        }
        
        const file = event.target.files[0];
        if (!file) return;
        
        const img = new Image();
        img.onload = async () => {
            try {
                updateStatus('Обработка...', 0);
                
                const originalCanvas = document.getElementById('originalCanvas');
                originalCanvas.width = img.width;
                originalCanvas.height = img.height;
                const ctx = originalCanvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                let src = null;
                try {
                    src = cv.imread(originalCanvas);
                    const results = await recognizeImage(src);
                    
                    if (results.length > 0) {
                        drawResults(src, results);
                        displayTextResults(results);
                        updateStatus(`✅ Распознано ${results.length} букв`, 100);
                    } else {
                        updateStatus('❌ Буквы не найдены', 100);
                        document.getElementById('resultCard').style.display = 'none';
                        document.getElementById('debugCard').style.display = 'none';
                    }
                } catch (err) {
                    console.error('Ошибка при распознавании:', err);
                    updateStatus(`❌ Ошибка распознавания: ${err.message}`, 0);
                    document.getElementById('resultCard').style.display = 'none';
                    document.getElementById('debugCard').style.display = 'none';
                } finally {
                    if (src && !src.isDeleted()) {
                        src.delete();
                    }
                }
                
            } catch (err) {
                console.error('Ошибка при загрузке изображения:', err);
                updateStatus(`❌ Ошибка: ${err.message}`, 0);
            }
        };
        img.src = URL.createObjectURL(file);
    }
    
    const dropZone = document.querySelector('.upload-area');
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.background = '#f0f0ff';
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.style.background = 'white';
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.background = 'white';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            const input = document.getElementById('fileInput');
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            input.files = dataTransfer.files;
            loadImage({ target: input });
        }
    });
    
    async function init() {
        console.log('init');

        updateStatus('Загрузка модели...', 10);
        const modelLoaded = await loadModel();
        if (modelLoaded && cvReady) {
            updateStatus('✅ Готово! Загрузите изображение', 100);
            setTimeout(() => {
                document.getElementById('progress').classList.add('hidden');
            }, 1000);
        }
    }
    
    if (typeof cv !== 'undefined' && cv.Mat) {
        cvReady = true;
        init();
        console.log('001');
        
    }

    console.log('002');
</script>
<script src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCVReady()"></script>
