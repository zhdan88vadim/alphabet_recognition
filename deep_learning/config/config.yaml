data:
  # train_root: "../dataset/"
  train_root: "../dataset_merge/"
  # train_root: "../dataset_val/"
  # train_root: "/mnt/ntfs/learn_ML/test_classes/Тестовое Python ML,CV/Тестовое_ML/тестовое_ml/dataset/test_unique_only/"
  # train_root: "/mnt/ntfs/learn_ML/test_classes/Тестовое Python ML,CV/Тестовое_ML/тестовое_ml/HOG_SVM/labeled_test_dataset/classified_by_letter"
  # val_root: "../dataset_val/"
  val_root: "../dataset_merge/"
  # val_root: "../dataset/"
  image_size: 64
  # image_size: 224
  train_split: 0.8
  num_workers: 4
  
model:
  # name: "alphabet_recognizer"
  num_classes: 33
  dropout_rate: 0.5
  name: 'resnet18'  # resnet18, resnet34, efficientnet_b0, mobilenet_v3_small
  pretrained: true
  gradual_unfreezing: false  # Включить постепенную разморозку  
  
training:
  batch_size: 32
  epochs: 20
  learning_rate: 0.0001
  weight_decay: 0.02
  scheduler_patience: 2
  early_stopping_patience: 5
  backbone_lr: 0.00001
  classifier_lr: 0.0005   # 0.001
  gradient_clip_norm: 1.0
  
augmentation:
  train:
    enable_blobs: true
    enable_spots: true
    enable_stroke_variation: true
    enable_bleed: true
    enable_missing_part: true
    rotation_degrees: 2
    translate: [0.05, 0.1]
    shear: 25

mlflow_experiment_name: "alphabet_recognition_experiments"
run_name: "baseline_64x64_name"    