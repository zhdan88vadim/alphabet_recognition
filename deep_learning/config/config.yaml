data:
  train_root: "../dataset/"
  val_root: "../dataset_val/"
  image_size: 28
  train_split: 0.8
  num_workers: 4
  
model:
  name: "alphabet_recognizer"
  num_classes: 33
  dropout_rate: 0.5
  
training:
  batch_size: 64
  epochs: 10
  learning_rate: 0.0005
  weight_decay: 0.02
  scheduler_patience: 2
  early_stopping_patience: 5
  gradient_clip_norm: 1.0
  
augmentation:
  train:
    enable_blobs: true
    enable_spots: true
    enable_stroke_variation: true
    enable_bleed: true
    enable_missing_part: true
    rotation_degrees: 2
    translate: [0.05, 0.1]
    shear: 25

mlflow_experiment_name: "alphabet_recognition_experiments"
run_name: "baseline_64x64_name"    